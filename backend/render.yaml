# =============================================================================
# Render.com — Infrastructure as Code
# Deploys: Node.js Express backend + Managed PostgreSQL
# =============================================================================
# Deploy: connect your GitHub repo to Render and push this file.
# Render automatically detects render.yaml and provisions services.
# =============================================================================

databases:
  - name: election-db
    databaseName: online_election
    plan: free
    region: oregon

services:
  - type: web
    name: election-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: >
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: election-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false  # Set manually to your Vercel frontend URL
      - key: FRONTEND_URL
        sync: false  # Set manually to your Vercel frontend URL
      - key: SMTP_HOST
        sync: false  # Set manually (e.g., smtp.resend.com)
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false  # e.g., noreply@yourdomain.com
